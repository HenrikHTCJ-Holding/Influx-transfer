trigger:
  branches:
    include:
      - main

pr: none

# Deploy-only pipeline (Azure Function App).
# Uses a Microsoft-hosted agent.

pool:
  vmImage: 'windows-latest'

variables:
  - name: pythonVersion
    value: '3.11'

steps:
  - task: AzureCLI@2
    displayName: 'Deploy Azure Function (zip deploy)'
    inputs:
      azureSubscription: 'FuncAPP_InfluxDB'
      scriptType: 'ps'
      scriptLocation: 'inlineScript'
      inlineScript: |
        $ErrorActionPreference = 'Stop'

        $srcRoot = "$(Build.SourcesDirectory)"
        $zipPath = "$(Build.ArtifactStagingDirectory)\deploy.zip"

        if (Test-Path $zipPath) { Remove-Item $zipPath -Force }

        $paths = @(
          (Join-Path $srcRoot 'function_app.py'),
          (Join-Path $srcRoot 'host.json'),
          (Join-Path $srcRoot 'requirements.txt'),
          (Join-Path $srcRoot 'src')
        )

        Compress-Archive -Path $paths -DestinationPath $zipPath -Force

        # Ensure Azure builds Python dependencies from requirements.txt
        az functionapp config appsettings set `
          --resource-group 'InfluxDB' `
          --name 'InfluxDB' `
          --settings `
            SCM_DO_BUILD_DURING_DEPLOYMENT=true `
            FUNCTIONS_WORKER_RUNTIME=python `
            WEBSITE_TIME_ZONE='Romance Standard Time'

        az functionapp deployment source config-zip `
          --resource-group 'InfluxDB' `
          --name 'InfluxDB' `
          --src $zipPath

        az functionapp restart `
          --resource-group 'InfluxDB' `
          --name 'InfluxDB'
