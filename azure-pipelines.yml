trigger:
  branches:
    include:
      - main

pr: none

# Deploy-only pipeline (Azure Function App).
# Uses a Microsoft-hosted agent.

pool:
  vmImage: 'windows-latest'

variables:
  - name: pythonVersion
    value: '3.11'

steps:
  - task: AzureCLI@2
    displayName: 'Deploy Azure Function (zip deploy)'
    inputs:
      azureSubscription: 'FuncAPP_InfluxDB'
      scriptType: 'ps'
      scriptLocation: 'inlineScript'
      inlineScript: |
        $ErrorActionPreference = 'Stop'

        $srcRoot = "$(Build.SourcesDirectory)"
        $zipPath = "$(Build.ArtifactStagingDirectory)\deploy.zip"

        if (Test-Path $zipPath) { Remove-Item $zipPath -Force }

        # IMPORTANT: Zip from repo root with relative paths so files land in wwwroot correctly.
        Push-Location $srcRoot
        try {
          Compress-Archive -Path @('function_app.py', 'host.json', 'requirements.txt', 'src') -DestinationPath $zipPath -Force
        } finally {
          Pop-Location
        }

        # Ensure Azure builds Python dependencies from requirements.txt
        az functionapp config appsettings set `
          --resource-group 'InfluxDB' `
          --name 'InfluxDBPy' `
          --settings `
            SCM_DO_BUILD_DURING_DEPLOYMENT=true `
            FUNCTIONS_WORKER_RUNTIME=python `
            WEBSITE_TIME_ZONE='Romance Standard Time'

        az functionapp deployment source config-zip `
          --resource-group 'InfluxDB' `
          --name 'InfluxDBPy' `
          --src $zipPath

        az functionapp restart `
          --resource-group 'InfluxDB' `
          --name 'InfluxDBPy'
