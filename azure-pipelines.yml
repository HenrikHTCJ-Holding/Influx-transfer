trigger:
  branches:
    include:
      - main

pr: none

# Deploy-only pipeline (Azure Function App).
# Uses a Microsoft-hosted agent.

pool:
  vmImage: 'windows-latest'

variables:
  - name: pythonVersion
    value: '3.11'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: $(pythonVersion)
    displayName: 'Use Python $(pythonVersion)'

  - task: PowerShell@2
    displayName: 'Vendor Python dependencies for Linux Functions'
    inputs:
      targetType: 'inline'
      workingDirectory: '$(Build.SourcesDirectory)'
      script: |
        $ErrorActionPreference = 'Stop'
        python -m pip install --upgrade pip
        if (Test-Path .python_packages) { Remove-Item .python_packages -Recurse -Force }
        pip install -r requirements.txt -t .python_packages\lib\site-packages
        # `Compress-Archive` skips hidden files/folders; `.python_packages` is typically hidden on Windows agents.
        Get-ChildItem -Force .python_packages -Recurse -ErrorAction SilentlyContinue |
          ForEach-Object { $_.Attributes = $_.Attributes -band (-bnot [IO.FileAttributes]::Hidden) }

  - task: AzureCLI@2
    displayName: 'Deploy Azure Function (zip deploy)'
    inputs:
      azureSubscription: 'FuncAPP_InfluxDB'
      scriptType: 'ps'
      scriptLocation: 'inlineScript'
      inlineScript: |
        $ErrorActionPreference = 'Stop'

        $srcRoot = "$(Build.SourcesDirectory)"
        $zipPath = "$(Build.ArtifactStagingDirectory)\deploy.zip"

        if (Test-Path $zipPath) { Remove-Item $zipPath -Force }

        # IMPORTANT: Zip from repo root with relative paths so files land in wwwroot correctly.
        Push-Location $srcRoot
        try {
          # Deploy classic Python functions only. Including `function_app.py` (v2 model) can confuse
          # discovery on some Flex Consumption hosts ("Reading functions metadata (Custom)").
          Compress-Archive -Path @('host.json', 'requirements.txt', 'src', 'influx_to_sql_transfer', '.python_packages') -DestinationPath $zipPath -Force
        } finally {
          Pop-Location
        }

        # Flex Consumption does not support SCM_DO_BUILD_DURING_DEPLOYMENT; remove if present.
        az functionapp config appsettings delete `
          --resource-group 'InfluxDB' `
          --name 'InfluxDBPy' `
          --setting-names SCM_DO_BUILD_DURING_DEPLOYMENT

        az functionapp config appsettings set `
          --resource-group 'InfluxDB' `
          --name 'InfluxDBPy' `
          --settings `
            FUNCTIONS_EXTENSION_VERSION=~4

        az functionapp deployment source config-zip `
          --resource-group 'InfluxDB' `
          --name 'InfluxDBPy' `
          --src $zipPath

        az functionapp restart `
          --resource-group 'InfluxDB' `
          --name 'InfluxDBPy'
